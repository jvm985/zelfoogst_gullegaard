services:
  db:
    image: postgres:15-alpine
    container_name: mijn-csa-db
    restart: always
    environment:
      POSTGRES_DB: mijn-csa
      POSTGRES_USER: joachim
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mijn-csa-network

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: mijn-csa-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://joachim:${DB_PASSWORD:-password}@db:5432/mijn-csa?schema=public
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      PORT: 3000
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    depends_on:
      - db
    networks:
      - mijn-csa-network

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: mijn-csa-frontend
    restart: always
    ports:
      - "3005:80"
    depends_on:
      - backend
    networks:
      - mijn-csa-network

networks:
  mijn-csa-network:
    driver: bridge

volumes:
  postgres_data:
