# Nginx Configuration for Host Server (Reverse Proxy)
# Save this to /etc/nginx/sites-available/gullegaard on your production server

server {
    listen 80;
    server_name yourdomain.be; # VERVANG DOOR JOUW DOMEINNAAM

    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name yourdomain.be; # VERVANG DOOR JOUW DOMEINNAAM

    # SSL Certificates (will be filled in by Certbot)
    # ssl_certificate /etc/letsencrypt/live/yourdomain.be/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.be/privkey.pem;
    
    # Modern SSL settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    location / {
        proxy_pass http://127.0.0.1:7000; # Onze app op poort 7000
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase upload limit for large forms/images
        client_max_body_size 10M;
    }
}
